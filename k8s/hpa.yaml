apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dr-api
  namespace: dr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dr-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # k3s ships metrics-server by default, so CPU-based autoscaling works
          # out of the box (we only disabled traefik + servicelb).
          averageUtilization: 70

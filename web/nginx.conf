# dr-web — serves the static frontend and reverse-proxies /api to the Go API
# Service (dr-api) in the same Kubernetes namespace. Self-contained: no external
# dependencies.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # API → Go service (ClusterIP Service "dr-api" on port 80)
    location /api/ {
        proxy_pass         http://dr-api:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static assets: real 404 for missing files (don't fall back to index.html)
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|css|js|json|woff2?)$ {
        try_files $uri =404;
        expires 1h;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }
}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: dr-api
  namespace: dr
  labels:
    app: dr-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dr-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: dr-api
    spec:
      containers:
        - name: dr-api
          image: dr-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATA_PATH
              value: /data/seed.json
          volumeMounts:
            - name: seed
              mountPath: /data
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 300m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: seed
          configMap:
            name: dr-seed
            # Optional so pods still start (embedded fallback) if the configmap
            # has not been created yet.
            optional: true

name: CI

# Fast sanity checks on every push/PR to main: vet + build the Go API, and
# confirm both images build (no push).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Vet & build the Go API
        working-directory: backend
        run: |
          go vet ./...
          CGO_ENABLED=0 go build -o /dev/null .

      - name: Docker build (sanity, no push)
        run: |
          docker build -t dr-api:ci backend
          docker build -t dr-web:ci -f web/Dockerfile .

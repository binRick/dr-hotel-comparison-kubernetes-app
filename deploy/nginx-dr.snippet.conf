# =============================================================================
# dr.ximg.app — reverse proxy into the self-contained k8s app
# =============================================================================
# This is the ONLY ximg-side change needed. The whole app (frontend + /api) is
# served by the dr-web NodePort in k3s, so nginx just forwards everything —
# exactly the swaudit.net / rxfitt pattern. No static mount, no /api split.
#
# Integration into /root/ximg-web/nginx/nginx.conf — TWO edits:
#   1) Append `dr.ximg.app` to the big HTTP->HTTPS redirect block's server_name list.
#   2) Add the HTTPS server block below.
# Then:  docker compose exec nginx nginx -t && docker compose exec nginx nginx -s reload
# =============================================================================

server {
    listen 443 ssl;
    server_name dr.ximg.app;

    access_log /var/log/nginx/dr.access.log;
    error_log  /var/log/nginx/dr.error.log;

    ssl_certificate     /etc/letsencrypt/live/wildcard.ximg.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wildcard.ximg.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    include /etc/nginx/shared.conf;

    # Everything (frontend + /api) → dr-web NodePort in k3s, via the host gateway.
    location / {
        proxy_pass         http://host.docker.internal:30080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
